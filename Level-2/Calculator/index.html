<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator-shell" aria-label="Calculator">
    <section class="calculator" aria-labelledby="calculator-title">
      <div class="calculator-header">
        <h1 id="calculator-title">Calculator</h1>
        <span class="status" id="status">Ready</span>
      </div>

      <div class="display" aria-live="polite">
        <div class="history" id="history"></div>
        <output class="current" id="display">0</output>
      </div>

      <div class="keys" id="keys">
        <button class="key key-soft" type="button" data-action="clear">C</button>
        <button class="key key-soft" type="button" data-action="delete">DEL</button>
        <button class="key key-soft" type="button" data-action="percent">%</button>
        <button class="key key-operator" type="button" data-value="/">&divide;</button>

        <button class="key" type="button" data-value="7">7</button>
        <button class="key" type="button" data-value="8">8</button>
        <button class="key" type="button" data-value="9">9</button>
        <button class="key key-operator" type="button" data-value="*">&times;</button>

        <button class="key" type="button" data-value="4">4</button>
        <button class="key" type="button" data-value="5">5</button>
        <button class="key" type="button" data-value="6">6</button>
        <button class="key key-operator" type="button" data-value="-">&minus;</button>

        <button class="key" type="button" data-value="1">1</button>
        <button class="key" type="button" data-value="2">2</button>
        <button class="key" type="button" data-value="3">3</button>
        <button class="key key-operator" type="button" data-value="+">+</button>

        <button class="key key-soft" type="button" data-action="toggle-sign">&plusmn;</button>
        <button class="key" type="button" data-value="0">0</button>
        <button class="key" type="button" data-value=".">.</button>
        <button class="key key-equals" type="button" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
